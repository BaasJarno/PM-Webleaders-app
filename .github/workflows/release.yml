# Handmatig: alleen build-artefacten (geen GitHub Release).
# Tag v*: build + GitHub Release met DMG, EXE en blockmaps.
#
# Gebruik: git tag v1.0.1 && git push origin v1.0.1

name: Build en release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

# contents: write = releases + assets. pull-requests: read = --generate-notes (gh release create).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build (macOS)
        run: |
          npm ci
          npm run dist:mac

      - uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            release/*.dmg
            release/*.blockmap
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build (Windows)
        shell: pwsh
        run: |
          npm ci
          npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-assets"
          merge-multiple: true
          path: dist

      - name: Staging directory for release upload
        run: |
          mkdir -p upload
          find dist -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.blockmap' \) -exec cp -v {} upload/ \;
          echo "--- upload/ ---"
          ls -la upload/

      - name: Create or update GitHub Release (gh CLI; bestandsnamen met spaties)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t files < <(find upload -maxdepth 1 -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::Geen bestanden in upload/ (leeg na download?)"
            find . -type f 2>/dev/null | head -80
            exit 1
          fi
          TAG="${{ github.ref_name }}"

          if gh release view "$TAG" 2>/dev/null; then
            echo "Release $TAG bestaat al; bestanden toevoegen/vervangen…"
            gh release upload "$TAG" "${files[@]}" --clobber
          else
            # Volgorde: tag, daarna asset-bestanden, daarna flags (zie gh help release create)
            gh release create "$TAG" "${files[@]}" \
              --title "Webleaders PM $TAG" \
              --generate-notes \
              --latest
          fi
