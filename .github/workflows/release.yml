# Geen actions/upload-artifact: dat telt mee op je GitHub Actions-opslaglimiet.
# Op tags: lege release aanmaken, daarna per platform direct gh release upload (zelfde token).

name: Build en release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Altijd OK (nooit skipped) zodat de build-jobs kunnen draaien; op tag wordt de release klaar gezet.
  release-or-skip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitHub Release aanmaken (alleen bij tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" 2>/dev/null; then
            gh release create "${GITHUB_REF_NAME}" --title "Webleaders PM ${GITHUB_REF_NAME}" --generate-notes
          else
            echo "Release bestaat al."
          fi

      - name: Handmatige run (zonder tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: echo "Geen tag — build-only; geen upload naar Releases."

  build-macos:
    needs: [release-or-skip]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build (macOS)
        run: |
          npm ci
          npm run dist:mac

      - name: Upload bestanden naar GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          cd release
          shopt -s nullglob
          for f in *.dmg *.zip *.blockmap *.yml; do
            echo "Upload: $f"
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done

  build-windows:
    needs: [release-or-skip]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build (Windows)
        shell: pwsh
        run: |
          npm ci
          npm run dist:win

      - name: Upload bestanden naar GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $items = @(
            Get-ChildItem -Path release -Filter *.exe -File
            Get-ChildItem -Path release -Filter *.blockmap -File
            Get-ChildItem -Path release -Filter *.yml -File
          )
          if ($items.Count -eq 0) {
            Get-ChildItem release | ForEach-Object { Write-Host "release:" $_.Name }
            throw "Geen .exe, .blockmap of .yml in release/"
          }
          foreach ($f in $items) {
            Write-Host "Upload: $($f.Name)"
            gh release upload $tag $f.FullName --clobber
          }
