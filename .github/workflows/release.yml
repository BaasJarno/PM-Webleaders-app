# Geen actions/upload-artifact: dat telt mee op je GitHub Actions-opslaglimiet.
# Op tags: lege release aanmaken, daarna per platform direct gh release upload (zelfde token).

name: Build en release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Altijd OK (nooit skipped) zodat de build-jobs kunnen draaien; op tag wordt de release klaar gezet.
  release-or-skip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitHub Release aanmaken (alleen bij tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" 2>/dev/null; then
            gh release create "${GITHUB_REF_NAME}" --title "Webleaders PM ${GITHUB_REF_NAME}" --generate-notes
          else
            echo "Release bestaat al."
          fi

      - name: Handmatige run (zonder tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: echo "Geen tag — build-only; geen upload naar Releases."

  build-macos:
    needs: [release-or-skip]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build (macOS)
        run: |
          npm ci
          npm run dist:mac

      - name: Upload bestanden naar GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          cd release
          shopt -s nullglob
          for f in *.dmg *.zip *.blockmap *.yml; do
            echo "Upload: $f"
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done

  build-windows:
    needs: [release-or-skip]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build (Windows)
        shell: pwsh
        run: |
          npm ci
          npm run dist:win

      - name: Upload bestanden naar GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not (Test-Path "release")) { throw "Map release/ ontbreekt na build" }
          Get-ChildItem "release" | ForEach-Object { Write-Host "release:" $_.Name }
          $exe = @(Get-ChildItem "release\*.exe" -File -ErrorAction SilentlyContinue)
          $map = @(Get-ChildItem "release\*.blockmap" -File -ErrorAction SilentlyContinue)
          $yml = @(Get-ChildItem "release\*.yml" -File -ErrorAction SilentlyContinue)
          $items = @($exe) + @($map) + @($yml)
          if ($items.Count -eq 0) { throw "Geen .exe, .blockmap of .yml in release/" }
          $hasLatest = $items | Where-Object { $_.Name -eq "latest.yml" }
          if (-not $hasLatest) {
            throw "latest.yml ontbreekt: electron-updater op Windows heeft dit bestand nodig. Controleer dist:win / NSIS-output."
          }
          foreach ($f in $items) {
            Write-Host "Upload: $($f.Name)"
            gh release upload $tag $f.FullName --clobber
          }

  # Voorkomt “half” uitgebrachte tags: Windows levert latest.yml, macOS latest-mac.yml.
  verify-updater-metadata:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Controleren dat updater-yml op de release staat
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"
          base="https://github.com/${REPO}/releases/download/${TAG}"
          ok=true
          for name in latest.yml latest-mac.yml; do
            url="${base}/${name}"
            code="$(curl -sS -L -o /dev/null -w "%{http_code}" "$url")"
            echo "${url} -> HTTP ${code}"
            if [ "${code}" != "200" ]; then
              echo "::error::${name} ontbreekt of is niet publiek (HTTP ${code}). Controleer of de Windows- en macOS-build zijn geslaagd en alle bestanden zijn geüpload."
              ok=false
            fi
          done
          if [ "$ok" != "true" ]; then
            exit 1
          fi
